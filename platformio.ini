; PlatformIO configuration for the Wemos Lolin32 OLED board
; Built-in SSD1306 128x64 OLED on I2C: SDA=GPIO5, SCL=GPIO4, address 0x3C

[env]
platform = espressif32
board = lolin32
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit SH110X@^2.1.10
    adafruit/Adafruit GFX Library@^1.11.11

; Main firmware: IR pulse monitor
[env:lolin32]
build_src_filter = +<*> -<display_test.cpp>

; Diagnostic firmware: cycles OLED driver/geometry configs
[env:lolin32_displaytest]
build_src_filter = +<*> -<main.cpp>
