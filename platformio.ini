; PlatformIO configuration.
;
; Targets:
;   lolin32             - Wemos Lolin32 OLED: IR monitor + NEC/Vatos decode + TX
;   lolin32_displaytest - OLED driver/geometry config finder
;   esp32-s3-matrix     - ESP32-S3-Matrix: 8x8 LED laser-tag target
;
; Wireless: both firmware targets bring up WiFi (credentials set over serial via
; the TagNet library, stored in NVS), ArduinoOTA, and UDP telemetry. After one
; USB flash, update over the air:
;   pio run -e <target>-ota -t upload

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

; --- Lolin32 (ESP32) shared settings ---------------------------------------
[lolin32_base]
board = lolin32
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.10
    adafruit/Adafruit SH110X@^2.1.10
    adafruit/Adafruit GFX Library@^1.11.11

; Main firmware: IR monitor + NEC/Vatos decode + IR transmit
[env:lolin32]
extends = lolin32_base
build_src_filter = +<*> -<display_test.cpp> -<matrix_main.cpp>

; Diagnostic firmware: cycles OLED driver/geometry configs
[env:lolin32_displaytest]
extends = lolin32_base
build_src_filter = +<*> -<main.cpp> -<matrix_main.cpp>

; OTA variant of the main Lolin32 firmware (after one USB flash).
; Using the DHCP IP because mDNS (.local) doesn't resolve on this host; set a
; DHCP reservation for the board or update this if the IP changes.
[env:lolin32-ota]
extends = env:lolin32
upload_protocol = espota
upload_port = 192.168.1.48

; --- ESP32-S3-Matrix --------------------------------------------------------
; 8x8 WS2812 matrix on GPIO14; IR receiver on GPIO1; activity LED on GPIO7.
[env:esp32-s3-matrix]
board = esp32-s3-devkitc-1
; The ESP32-S3-Matrix is an ESP32-S3FH4R2 with 4MB flash (not the devkit's 8MB);
; the header must match or the flash probe asserts at boot (reboot loop).
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = default.csv
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1
; Don't toggle DTR/RTS when opening the serial monitor — on the S3's USB-CDC
; that resets the board into the bootloader. Lets `pio device monitor` observe
; logs and send commands (e.g. "bright 8") safely.
monitor_rts = 0
monitor_dtr = 0
lib_deps =
    fastled/FastLED@^3.7.0
    bblanchon/ArduinoJson@^7
build_src_filter = +<matrix_main.cpp>

; OTA variant of the matrix firmware (after one USB flash).
; Using the DHCP IP because mDNS (.local) doesn't resolve on this host; set a
; DHCP reservation for the board or update this if the IP changes.
[env:esp32-s3-matrix-ota]
extends = env:esp32-s3-matrix
upload_protocol = espota
upload_port = 192.168.1.24

; --- Native unit tests ------------------------------------------------------
; Pure-logic tests for the ControlProto library against the wire-contract
; golden vectors. Runs host-compiled (no board) via PlatformIO's built-in Unity.
; lib_ignore keeps the Arduino-only shared libs out of the LDF so the native
; toolchain never sees Arduino.h / FastLED / WiFi.
[env:native]
platform = native
; The shared [env] sets framework = arduino, which native does not provide;
; clear it so the host toolchain compiles plain C++.
framework =
lib_deps =
    bblanchon/ArduinoJson@^7
lib_ignore =
    TagNet
    Vatos
    IrFramer
